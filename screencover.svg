<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d8bff"/>
      <stop offset="1" stop-color="#4c63d2"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11162b"/>
    </linearGradient>
  </defs>

  <!-- Bright rounded badge so the icon stays visible on dark desktops -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#badge)"/>

  <!-- Three screens (multi-monitor) -->
  <g>
    <rect x="96"  y="170" width="132" height="96" rx="12" fill="#e8edff"/>
    <rect x="190" y="150" width="132" height="116" rx="12" fill="#f4f7ff"/>
    <rect x="284" y="170" width="132" height="96" rx="12" fill="#e8edff"/>
    <!-- shared stand -->
    <rect x="236" y="266" width="40" height="34" fill="#c2ccf5"/>
    <rect x="196" y="298" width="120" height="16" rx="8" fill="#c2ccf5"/>
  </g>

  <!-- Dark cover sweeping down over the screens -->
  <path d="M96 170 q160 64 320 0 v40 q-160 64 -320 0 z" fill="url(#cover)" opacity="0.96"/>
  <rect x="96" y="200" width="320" height="66" rx="0" fill="url(#cover)" opacity="0.96"/>
  <path d="M96 266 q160 56 320 0 v-66 h-320 z" fill="url(#cover)" opacity="0.96"/>

  <!-- Crescent moon = screensaver / rest -->
  <g transform="translate(330,196)">
    <circle cx="0" cy="0" r="34" fill="#ffd866"/>
    <circle cx="14" cy="-8" r="30" fill="url(#cover)"/>
  </g>

  <!-- A couple of stars -->
  <g fill="#ffd866">
    <path d="M150 196 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z"/>
    <circle cx="206" cy="232" r="4"/>
    <circle cx="288" cy="210" r="3"/>
  </g>
</svg>
