<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3550"/>
      <stop offset="1" stop-color="#1f2638"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#566583"/>
      <stop offset="1" stop-color="#3c465e"/>
    </linearGradient>
  </defs>

  <!-- Subtle muted badge: just enough to define the shape on a dark desktop -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#badge)"/>

  <!-- Curved ultrawide monitor: bezel band that bows downward like a curved panel -->
  <path d="M70 200 Q256 224 442 200 L442 304 Q256 328 70 304 Z" fill="url(#bezel)"/>

  <!-- Blanked (covered) screen surface -->
  <path d="M88 211 Q256 232 424 211 L424 293 Q256 314 88 293 Z" fill="#141a26"/>

  <!-- Crescent moon = screensaver / rest (muted amber) -->
  <g transform="translate(300,256)">
    <circle cx="0" cy="0" r="26" fill="#cdab63"/>
    <circle cx="11" cy="-6" r="23" fill="#141a26"/>
  </g>

  <!-- A couple of faint stars -->
  <g fill="#cdab63">
    <path d="M170 248 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z" opacity="0.85"/>
    <circle cx="214" cy="276" r="3" opacity="0.7"/>
    <circle cx="248" cy="240" r="2.5" opacity="0.6"/>
  </g>
</svg>
